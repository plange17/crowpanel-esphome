external_components:
  - source: github://plange17/crowpanel-esphome
    components: [crowpanel_touch]
    
esphome:
  name: crowpanel-70-advance
  friendly_name: Crowpanel 7.0 Advance
  platformio_options:
    build_flags:
      - "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
      
psram:
  mode: octal
  speed: 80MHz
logger:

api:
  encryption:
    key: "I22I+Eh3kudKrD4u+fNvvvT3jB9vdjLgT71cvdIWTQs="

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Crowpanel 7.0 A Fallback Hotspot
    password: "KOAsZNMgdW4S"

captive_portal:
      
crowpanel_touch:
  id: touch_input
  i2c_id: i2c_bus

# I2C-Bus für den STC8H-Coprozessor, Touch-Controller und die RTC

i2c:
  - id: i2c_bus
    sda: 15
    scl: 16
    scan: true
    frequency: 400kHz

# Registrierung des STC8H als generisches I2C-Gerät zur direkten Lambda-Steuerung
i2c_device:
  - id: stc8h_coprocessor
    address: 0x30

# PCF8563 Echtzeituhr (RTC) für autarke Zeitanzeige bei Stromausfall
time:
  - platform: pcf8563
    id: rtc_time
    address: 0x51

# -----------------------------------------------------------------------------
# AUDIO-KOMPONENTEN (I2S Mikrofon & Lautsprecher-Verstärker)
# -----------------------------------------------------------------------------

i2s_audio:
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO19
    
  - id: i2s_speaker_bus
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5

# Onboard-Mikrofon (INMP441) für Sprachassistenten (Voice Assistant)

microphone:
  - platform: i2s_audio
    id: board_mic
    i2s_audio_id: i2s_mic_bus
    adc_type: external
    i2s_din_pin: GPIO20
    pdm: false

# Onboard-Lautsprecher (NS4168/NS4268)

speaker:
  - platform: i2s_audio
    id: speaker_id
    i2s_audio_id: i2s_speaker_bus
    dac_type: external
    i2s_dout_pin: GPIO4
    sample_rate: 48000

  - platform: mixer
    id: mixer_speaker_id
    output_speaker: speaker_id
    source_speakers:
      - id: announcement_spk_mixer_input
      - id: media_spk_mixer_input

  - platform: resampler
    id: media_spk_resampling_input
    output_speaker: media_spk_mixer_input

  - platform: resampler
    id: announcement_spk_resampling_input
    output_speaker: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "CrowPanel Lautsprecher"
    id: board_speaker
    announcement_pipeline:
      speaker: announcement_spk_resampling_input

# -----------------------------------------------------------------------------
# HARDWARE-ANSCHLÜSSE & SCHALTER (STC8H & GPIOs)
# -----------------------------------------------------------------------------

switch:
  # Physische Aktivierung des Audio-Verstärkers (Mute/Shut control)
  - platform: gpio
    name: "Lautsprecher Verstärker"
    id: speaker_enable
    pin: GPIO1
    restore_mode: RESTORE_DEFAULT_ON

  # Integrierter Buzzer gesteuert über I2C-Befehle an den STC8H
  - platform: template
    name: "Buzzer"
    id: buzzer
    optimistic: true
    turn_on_action:
      - lambda: |-
          uint8_t cmd = 246; // V1.3/V1.4 Befehl für Buzzer AN
          id(stc8h_coprocessor).write(&cmd, 1);
    turn_off_action:
      - lambda: |-
          uint8_t cmd = 247; // V1.3/V1.4 Befehl für Buzzer AUS
          id(stc8h_coprocessor).write(&cmd, 1);

# -----------------------------------------------------------------------------
# STC8H HINTERGRUNDBELEUCHTUNG (Dimmbares Backlight)
# -----------------------------------------------------------------------------
# In Version 1.4 mappt der STC8H Werte von 0 (max. Helligkeit) bis 244 (min. Helligkeit).
# 245 schaltet die Hintergrundbeleuchtung komplett aus.
output:
  - platform: template
    id: backlight_output
    type: float
    write_action:
      - if:
          condition:
              lambda: 'return state > 0;'
          then:
            - lambda: |-
                uint8_t cmd = 0; // Standardmäßig auf maximale Helligkeit einschalten
                id(stc8h_coprocessor).write(&cmd, 1);
          else:
            - lambda: |-
                uint8_t cmd = 245; // Display ausschalten
                id(stc8h_coprocessor).write(&cmd, 1);       

light:
  - platform: monochromatic
    name: "Display Helligkeit"
    id: display_backlight
    output: backlight_output
    default_transition_length: 0s

# -----------------------------------------------------------------------------
# IPS DISPLAY-TREIBER & TIMINGS (800x480 RGB Parallel)
# -----------------------------------------------------------------------------

display:
  - platform: rpi_dpi_rgb
    id: main_display
    color_order: RGB
    invert_colors: true
    update_interval: never
    auto_clear_enabled: false
    dimensions:
      width: 800
      height: 480
    de_pin: 42
    hsync_pin: 40
    vsync_pin: 41
    pclk_pin: 39
    pclk_frequency: 20MHz
    hsync_pulse_width: 4
    hsync_front_porch: 8
    hsync_back_porch: 8
    vsync_pulse_width: 4
    vsync_front_porch: 8
    vsync_back_porch: 8
    data_pins:
      red:
        - 7
        - 17
        - 18
        - 3
        - 46
      green:
        - 9
        - 10
        - 11
        - 12
        - 13
        - 14
      blue:
        - 21
        - 47
        - 48
        - 45
        - 38


# -----------------------------------------------------------------------------
# GRAFISCHE OBERFLÄCHE (LVGL Engine)
# -----------------------------------------------------------------------------

# Hier wird die LVGL-Grafikbibliothek initialisiert, die direkt im YAML-Format
# konfiguriert werden kann.

lvgl:
  touchscreens:
    - touchscreen_id: touch_input

  # Einfaches Dashboard-Beispiel mit Slidern und Buttons zum Testen
  pages:
    - id: main_page
      bg_color: 0x1A1A1A # Dunkler Hintergrund

      widgets:
        # Helligkeits-Slider
        - slider:
            id: brightness_slider
            align: TOP_MID
            y: 40
            width: 300
            height: 25
            min_value: 0
            max_value: 100
            value: 100
            on_value:
              - lambda: |-
                  float pct = x / 100.0;
                  auto call = id(display_backlight).make_call();
                  call.set_brightness(pct);
                  call.perform();
        - label:
            text: "Display Helligkeit"
            align: TOP_MID
            y: 15
            text_color: 0xFFFFFF
 
        # Buzzer Test-Button
        - button:
            id: test_buzzer_btn
            align: CENTER
            width: 150
            height: 50
            widgets:
              - label:
                  text: "Buzzer Test"
                  align: CENTER
            on_press:
              - switch.turn_on: buzzer
            on_release:
              - switch.turn_off: buzzer